# GuardRail Studio - Production Kubernetes Manifests
# ==================================================
#
# This file contains production-ready Kubernetes configurations for:
# 1. FastAPI Backend Deployment with health probes
# 2. Triton Inference Server Deployment with GPU allocation
# 3. Services (ClusterIP and LoadBalancer)
# 4. Horizontal Pod Autoscalers (HPA)
# 5. ConfigMaps and Secrets
# 6. NVIDIA Device Plugin (GPU support)
#
# Author: Principal Infrastructure Engineer

---
# =============================================================================
# Namespace
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: guardrail-studio
  labels:
    name: guardrail-studio
    environment: production

---
# =============================================================================
# ConfigMap: Application Configuration
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: guardrail-studio
data:
  TRITON_URL: "triton-service:8001"
  TRITON_MODEL_NAME: "guardrail_model"
  QDRANT_HOST: "qdrant-service"
  QDRANT_PORT: "6333"
  QDRANT_COLLECTION: "adversarial_patterns"
  LOG_LEVEL: "INFO"
  CORS_ORIGINS: "*"
  PROMPT_INJECTION_THRESHOLD: "0.85"
  PII_DETECTION_THRESHOLD: "0.80"
  TOXICITY_THRESHOLD: "0.75"
  MAX_BATCH_SIZE: "32"
  REQUEST_TIMEOUT_MS: "10"

---
# =============================================================================
# Secret: Database Credentials
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: database-credentials
  namespace: guardrail-studio
type: Opaque
stringData:
  # TODO: Replace with actual RDS endpoint from Terraform output
  POSTGRES_URL: "postgresql+asyncpg://guardrail_admin:CHANGEME@guardrail-studio-prod.xxx.rds.amazonaws.com:5432/guardrail_studio"
  DB_NAME: "guardrail_studio"

---
# =============================================================================
# Secret: W&B API Key
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: wandb-credentials
  namespace: guardrail-studio
type: Opaque
stringData:
  WANDB_API_KEY: "CHANGEME"
  WANDB_PROJECT: "guardrail-studio"
  WANDB_ENTITY: ""

---
# =============================================================================
# ServiceAccount: Backend with IRSA annotation
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: guardrail-backend
  namespace: guardrail-studio
  annotations:
    eks.amazonaws.com/role-arn: "${GUARDRAIL_BACKEND_ROLE_ARN}"
---

# =============================================================================
# Deployment: FastAPI Backend
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: guardrail-studio
  labels:
    app: backend
    tier: application
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        tier: application
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: guardrail-backend
      # Node selector for CPU nodes
      nodeSelector:
        role: cpu
        workload-type: general
      
      # Anti-affinity for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - backend
                topologyKey: kubernetes.io/hostname
      
      containers:
        - name: backend
          image: guardrail-studio/backend:latest
          imagePullPolicy: Always
          
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          
          # Environment variables
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: database-credentials
            - secretRef:
                name: wandb-credentials
          
          # Resource limits and requests
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          
          # Liveness probe
          livenessProbe:
            httpGet:
              path: /api/health/
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          # Readiness probe
          readinessProbe:
            httpGet:
              path: /api/health/
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          
          # Startup probe (for slow startup)
          startupProbe:
            httpGet:
              path: /api/health/
              port: 8001
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
      
      # Graceful termination
      terminationGracePeriodSeconds: 60

---
# =============================================================================
# Service: Backend (ClusterIP)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: guardrail-studio
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 8001
      targetPort: 8001
      protocol: TCP
  sessionAffinity: None

---
# =============================================================================
# Service: Backend (LoadBalancer for external access)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: backend-external
  namespace: guardrail-studio
  labels:
    app: backend
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
  type: LoadBalancer
  selector:
    app: backend
  ports:
    - name: http
      port: 80
      targetPort: 8001
      protocol: TCP

---
# =============================================================================
# HorizontalPodAutoscaler: Backend
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: guardrail-studio
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    # Primary: request latency p95 via custom metric
    - type: Object
      object:
        metric:
          name: http_request_duration_p95_ms
        describedObject:
          apiVersion: v1
          kind: Service
          name: backend-service
        target:
          type: Value
          value: "7"
    # Secondary: CPU as a fallback signal
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30

---
# =============================================================================
# Deployment: Triton Inference Server (GPU)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: triton
  namespace: guardrail-studio
  labels:
    app: triton
    tier: ml-inference
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: triton
  template:
    metadata:
      labels:
        app: triton
        tier: ml-inference
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
    spec:
      # Node selector for GPU nodes
      nodeSelector:
        role: gpu
        workload-type: ml-inference
        nvidia.com/gpu: "true"
      
      # Tolerate GPU taint
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      
      containers:
        - name: triton
          image: nvcr.io/nvidia/tritonserver:23.10-py3
          imagePullPolicy: IfNotPresent
          
          args:
            - tritonserver
            - --model-repository=/models
            - --strict-model-config=true
            - --log-verbose=1
            - --metrics-port=8002
          
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: grpc
              containerPort: 8001
              protocol: TCP
            - name: metrics
              containerPort: 8002
              protocol: TCP
          
          # GPU resource allocation
          resources:
            requests:
              memory: "4Gi"
              cpu: "2000m"
              nvidia.com/gpu: "1"
            limits:
              memory: "8Gi"
              cpu: "4000m"
              nvidia.com/gpu: "1"
          
          # Volume mounts
          volumeMounts:
            - name: model-repository
              mountPath: /models
              readOnly: true
          
          # Liveness probe
          livenessProbe:
            httpGet:
              path: /v2/health/live
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          # Readiness probe
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      
      # Model volume (use PersistentVolume in production)
      volumes:
        - name: model-repository
          emptyDir: {}
          # In production, use:
          # persistentVolumeClaim:
          #   claimName: triton-models-pvc
      
      terminationGracePeriodSeconds: 120

---
# =============================================================================
# Service: Triton (ClusterIP)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: triton-service
  namespace: guardrail-studio
  labels:
    app: triton
spec:
  type: ClusterIP
  selector:
    app: triton
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
    - name: grpc
      port: 8001
      targetPort: 8001
      protocol: TCP
    - name: metrics
      port: 8002
      targetPort: 8002
      protocol: TCP

---
# =============================================================================
# HorizontalPodAutoscaler: Triton
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: triton-hpa
  namespace: guardrail-studio
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: triton
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: External
      external:
        metric:
          name: DCGM_FI_DEV_MEM_COPY_UTIL
          selector:
            matchLabels:
              app: triton
        target:
          type: AverageValue
          averageValue: "75"
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600  # 10 min for GPU workloads
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60

---
# =============================================================================
# NVIDIA Device Plugin DaemonSet (GPU Support)
# =============================================================================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin-daemonset
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: nvidia-device-plugin-ds
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        name: nvidia-device-plugin-ds
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      
      priorityClassName: system-node-critical
      
      containers:
        - image: nvcr.io/nvidia/k8s-device-plugin:v0.14.1
          name: nvidia-device-plugin-ctr
          args:
            - --pass-device-specs=true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
      
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins

---
# =============================================================================
# PodDisruptionBudget: Backend
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: guardrail-studio
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: backend

---
# =============================================================================
# PodDisruptionBudget: Triton
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: triton-pdb
  namespace: guardrail-studio
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: triton
